<form [formGroup]="addArticle" (ngSubmit)="add()">
  <label for="title">Title</label>
  <input
    type="text"
    id="title"
    formControlName="title"
  >
  <label for="content">Content</label>
  <input
    type="text"
    id="content"
    formControlName="content"
  >
  <button type="submit">ADD</button>
</form>
